name : Y to', to', to' lo que tu quieres de mi

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build for ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    env:
      project_name: "rdks"
      rustdesk-server_version: "1.1.15"
    strategy:
      fail-fast: false
      matrix:
        include:
          - rustdesk_arch: "amd64"
            patch_arch: "x86_64"
            sdk_name: "openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - rustdesk_arch: "arm64v8"
            patch_arch: "aarch64_generic"
            sdk_name: "openwrt-sdk-25.12.4-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"
          - rustdesk_arch: "arm64v8"
            patch_arch: "aarch64_coretex-a53"
            sdk_name: "openwrt-sdk-25.12.4-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Clone Source Code
        uses: mokanove/mokanove/actions/clone@main
        with:
          sdk_name: ${{ matrix.sdk_name }}
          project_name: ${{ env.project_name }}

      - name: Get Version
        id: get_version
        run: |
          cd ${{ matrix.sdk_name }}/package/rdks
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Change Arch
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}
          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi

      - name: Preparation before compilation
        shell: bash
        run: |
            cd ${{ matrix.sdk_name }}/package/rdks/root/etc/rustdesk
            rm DONOTREMOVE
            curl -LO "https://github.com/rustdesk/rustdesk-server/releases/download/${{ env.rustdesk-server_version }}/rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip"
            unzip rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip
            rm rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip
            mv ${{ matrix.rustdesk_arch }}/* ./
            rm -rf ${{ matrix.rustdesk_arch }}/

      - name: Build!
        uses: mokanove/mokanove/actions/build@main
        with:
          sdk_name: ${{ matrix.sdk_name }}
          project_name: ${{ env.project_name }}

      - name: Rename compilation files
        shell: bash
        run: |
            cd ${{ matrix.sdk_name }}/bin/packages/*/base/
            mv rdks* rdks-${{ steps.get_version.outputs.version }}-${{ matrix.patch_arch }}.apk

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            ${{ matrix.sdk_name }}/bin/packages/**/*.apk
          body: |
            # 📝 Release Notes
            - The SDK has been upgraded to OpenWrt 25.12.4.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
