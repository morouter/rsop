name : Y to', to', to' lo que tu quieres de mi

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build for ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    env:
      project_name: "rsop"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "x86_64-unknown-linux-musl"
            release-name: "x86_64-linux-musl"
            tool: "cross"
            patch_arch: "x86_64"
            sdk_name: "openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - target: "aarch64-unknown-linux-musl"
            release-name: "aarch64-linux-musl"
            tool: "cross"
            patch_arch: "aarch64_generic"
            sdk_name: "openwrt-sdk-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Preparing build environment
        uses: mokanove/mokanove/actions/build-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Clone Source Code
        uses: mokanove/mokanove/actions/clone@main
        with:
          sdk_name: ${{ matrix.sdk_name }}
          project_name: ${{ env.project_name }}

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Change Arch
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}
          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi

      - name: Set up RUST
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: master
          targets: ${{ matrix.target }}

      - name: Set up CROSS
        shell: bash
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        shell: bash
        run: |
          git clone https://github.com/rustdesk/rustdesk-server.git
          cd rustdesk-server
          git checkout dependabot/submodules/master/libs/hbb_common-387603f
          git pull
          export RUSTFLAGS="-C opt-level=3 -C codegen-units=1"
          cross build --release --target ${{ matrix.target }}
          ls
          exit 1

      - name: Preparation before compilation
        shell: bash
        run: |
            cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}/root/etc/rustdesk
            rm DONOTREMOVE

      - name: Build!
        uses: mokanove/mokanove/actions/build@main
        with:
          sdk_name: ${{ matrix.sdk_name }}
          project_name: ${{ env.project_name }}

      - name: Rename compilation files
        shell: bash
        run: |
            mv ${{ matrix.sdk_name }}/bin/packages/*/base/rsop* $GITHUB_WORKSPACE/rsop-${{ steps.get_version.outputs.version }}-${{ matrix.patch_arch }}.apk

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            $GITHUB_WORKSPACE/*.apk
          body: |
            # 📝 Release Notes
            - Rename project to rsop
            - Using self-build binary and redevelopmenting go-rustdesk-server
            - Remove aarch64_coretex-a53 support
            # **Fuck Rust** and **never use rust to coding**!!!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
