name: NEVER USING RUST
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build for ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    env:
      project_name: "rsop"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "x86_64-unknown-linux-musl"
            release-name: "x86_64-linux-musl"
            patch_arch: "x86_64"
            sdk_name: "openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - target: "aarch64-unknown-linux-musl"
            release-name: "aarch64-linux-musl"
            patch_arch: "aarch64_generic"
            sdk_name: "openwrt-sdk-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Set up RUST
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}
      - name: Set up CROSS
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build binary
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
          OPENSSL_STATIC: "1"
          OPENSSL_VENDORED: "1"
          CROSS_NO_WARNINGS: "0"
        run: |
          git clone https://github.com/rustdesk/rustdesk-server.git
          cd rustdesk-server
          git checkout dependabot/submodules/master/libs/hbb_common-387603f
          git pull
          git submodule update --init --recursive
          printf '%s\n' \
            '[target.x86_64-unknown-linux-musl]' \
            'pre-build = [' \
            '  "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y cmake perl pkg-config libsodium-dev libsqlite3-dev wget",' \
            '  "wget -q https://www.openssl.org/source/openssl-3.0.13.tar.gz && tar xf openssl-3.0.13.tar.gz",' \
            '  "cd openssl-3.0.13 && ./Configure linux-x86_64 --prefix=/usr/local/openssl-musl no-shared && make -j$(nproc) && make install_sw",' \
            '  "rm -rf openssl-3.0.13 openssl-3.0.13.tar.gz"' \
            ']' \
            '[target.x86_64-unknown-linux-musl.env]' \
            'passthrough = ["DEBIAN_FRONTEND"]' \
            'volumes = ["/usr/local/openssl-musl"]' \
            '' \
            '[target.x86_64-unknown-linux-musl.env.set]' \
            'OPENSSL_STATIC = "1"' \
            'OPENSSL_DIR = "/usr/local/openssl-musl"' \
            '' \
            '[target.aarch64-unknown-linux-musl]' \
            'pre-build = [' \
            '  "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y cmake perl pkg-config libsodium-dev libsqlite3-dev wget gcc-aarch64-linux-gnu",' \
            '  "wget -q https://www.openssl.org/source/openssl-3.0.13.tar.gz && tar xf openssl-3.0.13.tar.gz",' \
            '  "cd openssl-3.0.13 && ./Configure linux-aarch64 --prefix=/usr/local/openssl-musl no-shared --cross-compile-prefix=aarch64-linux-gnu- && make -j$(nproc) && make install_sw",' \
            '  "rm -rf openssl-3.0.13 openssl-3.0.13.tar.gz"' \
            ']' \
            '[target.aarch64-unknown-linux-musl.env]' \
            'passthrough = ["DEBIAN_FRONTEND"]' \
            '' \
            '[target.aarch64-unknown-linux-musl.env.set]' \
            'OPENSSL_STATIC = "1"' \
            'OPENSSL_DIR = "/usr/local/openssl-musl"' \
            > Cross.toml
          export DEBIAN_FRONTEND=noninteractive
          export RUSTFLAGS="-C opt-level=3 -C codegen-units=1"
          cross build --release --target ${{ matrix.target }} --bins
          ls -al target/${{ matrix.target }}/release/
